apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: web-page-mesh-gateway
  namespace: apps-frontend-dev-01
spec:
  hosts:
    - "dev-01.skiyl9x.pp.ua"
  gateways:
    - traefik-gateway
  http:
    - match:
        - uri:
            prefix: /
      route:
        - destination:
            host: web-page.apps-frontend-dev-01.svc.cluster.local # The internal identity
            port:
              number: 80
