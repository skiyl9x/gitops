apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring-system # Make sure this namespace exists
spec:
  interval: 1h
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "67.x" # Uses latest v67 branch
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    # Grafana Configuration
    grafana:
      enabled: true
      persistence:
        enabled: true
        size: 5Gi
      adminPassword: "prom-operator" # Change this or use a Secret!
      
    # Prometheus Configuration
    prometheus:
      prometheusSpec:
        # This ensures the volume is writable by the prometheus user (UID 65534)
        securityContext:
          runAsUser: 65534
          runAsGroup: 65534
          fsGroup: 65534
          runAsNonRoot: true
        retention: 10d
        storageSpec:
          volumeClaimTemplate:
            spec:
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 10Gi
        # If your storage provider (like some NFS or Local Path) is stubborn, 
        # use the built-in initContainer to force the fix:
        initContainers:
          - name: init-chmod-data
            image: busybox:latest
            command: ["sh", "-c", "chmod -R 777 /prometheus"]
            securityContext:
              runAsUser: 1000
            volumeMounts:
              - name: prometheus-kube-prometheus-stack-prometheus-db
                mountPath: /prometheus

    # Disable Alertmanager if you don't need emails/slack pings yet
    alertmanager:
      enabled: false
