apiVersion: networking.istio.io/v1alpha3
kind: ServiceEntry
metadata:
  name: external-to-internal-bridge
  namespace: traefik-system # Deploy where Traefik is
spec:
  hosts:
    - "skiyl9x.pp.ua" 
  location: MESH_INTERNAL
  ports:
    - number: 80
      name: http
      protocol: HTTP
    - number: 443
      name: https
      protocol: HTTPS
  resolution: NONE
