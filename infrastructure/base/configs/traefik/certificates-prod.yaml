apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: prod-skiyl9x-pp-ua-tls
  namespace: traefik-system
spec:
  secretName: prod-skiyl9x-pp-ua-tls
  issuerRef:
    name: letsencrypt-dns-issuer
    kind: ClusterIssuer
  dnsNames:
    - "skiyl9x.pp.ua"
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: prod-skiyl9x-pp-ua-wildcard-tls
  namespace: traefik-system
spec:
  secretName: prod-skiyl9x-pp-ua-wildcard-tls
  issuerRef:
    name: letsencrypt-dns-issuer
    kind: ClusterIssuer
  dnsNames:
    - "*.skiyl9x.pp.ua"
