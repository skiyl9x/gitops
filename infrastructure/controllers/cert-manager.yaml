apiVersion: v1
kind: Namespace
metadata:
  name: cert-manager-system
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager-system
spec:
  chartRef:
    kind: OCIRepository
    name: cert-manager
  install:
    strategy:
      name: RetryOnFailure
      retryInterval: 2m
  interval: 12h
  upgrade:
    strategy:
      name: RetryOnFailure
      retryInterval: 3m
  values:
    crds:
      enabled: true
      keep: false
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: cert-manager
  namespace: cert-manager-system
spec:
  interval: 1m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    semver: 1.x
  url: oci://quay.io/jetstack/charts/cert-manager
