apiVersion: v1
kind: Namespace
metadata:
  labels:
    istio-injection: enabled
  name: traefik-system
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: dev-01-skiyl9x-pp-ua-wildcard-tls
  namespace: traefik-system
spec:
  dnsNames:
  - dev-01.skiyl9x.pp.ua
  - '*.dev-01.skiyl9x.pp.ua'
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-dns-issuer
  secretName: dev-01-skiyl9x-pp-ua-wildcard-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: infra-dev-skiyl9x-pp-ua-wildcard-tls
  namespace: traefik-system
spec:
  dnsNames:
  - '*.infra.dev.skiyl9x.pp.ua'
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-dns-issuer
  secretName: infra-dev-skiyl9x-pp-ua-wildcard-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: skiyl9x-pp-ua-wildcard-tls
  namespace: traefik-system
spec:
  dnsNames:
  - skiyl9x.pp.ua
  - '*.skiyl9x.pp.ua'
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-dns-issuer
  secretName: skiyl9x-pp-ua-wildcard-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: stage-skiyl9x-pp-ua-wildcard-tls
  namespace: traefik-system
spec:
  dnsNames:
  - stage.skiyl9x.pp.ua
  - '*.stage.skiyl9x.pp.ua'
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-dns-issuer
  secretName: stage-skiyl9x-pp-ua-wildcard-tls
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik-system
spec:
  chart:
    spec:
      chart: traefik
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
      version: 39.0.0
  install:
    createNamespace: true
  interval: 1m
  releaseName: traefik
  storageNamespace: traefik-system
  targetNamespace: traefik-system
  values:
    deployment:
      podAnnotations:
        proxy.istio.io/config: '{ "holdApplicationUntilProxyReceivesConfig": true
          }'
        sidecar.istio.io/inject: "true"
    gateway:
      enabled: true
      listeners:
        web:
          namespacePolicy:
            from: All
          port: 80
        websecure:
          certificateRefs:
          - group: ""
            kind: Secret
            name: dev-01-skiyl9x-pp-ua-wildcard-tls
          mode: Terminate
          namespacePolicy:
            from: All
          port: 443
          protocol: HTTPS
    ingressRoute:
      dashboard:
        enabled: true
        entryPoints:
        - websecure
        matchRule: Host(`traefik-dashboard.${cluster_domain}`)
    logs:
      access:
        enabled: true
        fields:
          headers:
            defaultMode: keep
        format: json
    ports:
      traefik:
        expose:
          default: true
      web:
        exposedPort: 80
        port: 80
      websecure:
        exposedPort: 443
        http:
          tls:
            enabled: true
        port: 443
    providers:
      kubernetesGateway:
        enabled: true
---
apiVersion: traefik.io/v1alpha1
kind: TLSStore
metadata:
  name: default
  namespace: traefik-system
spec:
  certificates:
  - secretName: infra-dev-skiyl9x-pp-ua-wildcard-tls
  - secretName: dev-01-skiyl9x-pp-ua-wildcard-tls
  - secretName: stage-skiyl9x-pp-ua-wildcard-tls
  - secretName: skiyl9x-pp-ua-wildcard-tls
