apiVersion: v1
kind: Namespace
metadata:
  name: monitoring-system
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring-system
spec:
  hostnames:
  - grafana.${cluster_domain}
  parentRefs:
  - kind: Gateway
    name: traefik-gateway
    namespace: traefik-system
    sectionName: websecure
  rules:
  - backendRefs:
    - name: kube-prometheus-stack-grafana
      port: 80
    matches:
    - path:
        type: PathPrefix
        value: /
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring-system
spec:
  chart:
    spec:
      chart: kube-prometheus-stack
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      version: 67.x
  install:
    crds: CreateReplace
  interval: 1h
  upgrade:
    crds: CreateReplace
  values:
    alertmanager:
      enabled: false
    grafana:
      adminPassword: prom-operator
      enabled: true
      persistence:
        enabled: true
        size: 5Gi
    prometheus:
      prometheusSpec:
        initContainers:
        - command:
          - sh
          - -c
          - chown -R 65534:65534 /prometheus
          image: busybox:latest
          name: init-chmod-data
          securityContext:
            runAsUser: 0
          volumeMounts:
          - mountPath: /prometheus
            name: prometheus-kube-prometheus-stack-prometheus-db
        retention: 10d
        securityContext:
          fsGroup: 65534
          runAsGroup: 65534
          runAsNonRoot: true
          runAsUser: 65534
        storageSpec:
          volumeClaimTemplate:
            spec:
              accessModes:
              - ReadWriteOnce
              resources:
                requests:
                  storage: 10Gi
