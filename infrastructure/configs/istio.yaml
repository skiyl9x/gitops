apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istiod
  namespace: istio-system
spec:
  chart:
    spec:
      chart: istiod
      sourceRef:
        kind: HelmRepository
        name: istio
        namespace: flux-system
      version: 1.29.x
  interval: 1m
  values:
    meshConfig:
      accessLogFile: /dev/stdout
      enableAutoMtls: true
